name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Hermex.slnx

      - name: Build
        run: dotnet build Hermex.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Hermex.Tests/Hermex.Tests.csproj -c Release --no-build --verbosity normal
