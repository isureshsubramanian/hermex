name: Release

# Publishes Hermex when a version tag is pushed, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
#
# On a tag this workflow:
#   1. packs the NuGet package
#   2. publishes it to GitHub Packages   (uses the built-in GITHUB_TOKEN)
#   3. creates a GitHub Release          (uses the built-in GITHUB_TOKEN)
#   4. publishes it to NuGet.org         (needs the NUGET_API_KEY repo secret)

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write    # required to create the GitHub Release
  packages: write    # required to publish to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test tests/Hermex.Tests/Hermex.Tests.csproj -c Release

      - name: Pack
        run: >
          dotnet pack src/Hermex/Hermex.csproj -c Release -o ./artifacts
          /p:Version=${{ steps.version.outputs.value }}
          /p:ContinuousIntegrationBuild=true

      # --- GitHub-side publishing (always available via GITHUB_TOKEN) ---------

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --no-symbols
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ github.ref_name }}"
          ./artifacts/*.nupkg
          --title "Hermex ${{ steps.version.outputs.value }}"
          --generate-notes

      # --- NuGet.org publishing (needs the NUGET_API_KEY secret) --------------

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
