name: Release

# Publishes the Hermex package to NuGet.org when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Requires a repository secret named NUGET_API_KEY (the key generated for the
# "Hermex" package id on nuget.org).

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test tests/Hermex.Tests/Hermex.Tests.csproj -c Release

      - name: Pack
        run: >
          dotnet pack src/Hermex/Hermex.csproj -c Release -o ./artifacts
          /p:Version=${{ steps.version.outputs.value }}
          /p:ContinuousIntegrationBuild=true

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: hermex-nupkg
          path: ./artifacts/*
